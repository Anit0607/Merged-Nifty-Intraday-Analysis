name: Morning Report

on:
  schedule:
    # 03:40 UTC = 09:10 AM IST (Mon-Fri)
    - cron: '40 3 * * 1-5'
  workflow_dispatch:

jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance numpy pandas requests pytz

      - name: Run morning report
        run: python morning_report.py