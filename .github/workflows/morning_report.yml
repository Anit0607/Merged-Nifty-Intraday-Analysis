name: Morning Report
on:
  schedule:
    - cron: '40 3 * * 1-5'
  workflow_dispatch:
permissions:
  contents: write
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: "${{ secrets.GITHUB_TOKEN }}"
      - uses: actions/setup-python@v4
        with: {python-version: '3.11'}
      - run: pip install yfinance numpy pandas requests pytz nltk feedparser
      - run: python morning_report.py
      - name: Commit and push session_state.json
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add session_state.json
          git diff --staged --quiet || git commit -m "Morning session state: $(date +'%Y-%m-%d')"
          git push