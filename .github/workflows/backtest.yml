name: Backtest

on:
  schedule:
    # 10:30 UTC = 04:00 PM IST (Mon-Fri)
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance numpy pandas requests pytz

      - name: Run backtest
        run: python backtest.py

      - name: Commit and push results
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add results.csv learnings.md params.json
          git diff --staged --quiet || git commit -m "Backtest: $(date +'%Y-%m-%d')"
          git push